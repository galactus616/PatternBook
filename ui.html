<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PatternBook Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: #f1f5f9;
      color: #0f172a;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .nav-item {
      margin-bottom: 15px;
      color: #94a3b8;
      cursor: pointer;
    }

    .nav-item.active,
    .nav-item:hover {
      color: white;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      height: 60px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .search {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      width: 250px;
    }

    /* Content */
    .content {
      padding: 20px;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card h3 {
      font-size: 14px;
      color: #64748b;
    }

    .card .value {
      font-size: 22px;
      font-weight: bold;
      margin-top: 5px;
    }

    /* Progress */
    .progress-box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .progress-bar {
      height: 10px;
      background: #e2e8f0;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 50%;
      background: #6366f1;
    }

    /* Grid bottom */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 15px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .list-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>PatternBook</h2>

    <div class="nav-item active">📊 Dashboard</div>
    <div class="nav-item">📚 Problems</div>
    <div class="nav-item">📈 Progress</div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <h3>Dashboard</h3>
      <input class="search" placeholder="Search..." />
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Stats -->
      <div class="cards">
        <div class="card">
          <h3>Total Problems</h3>
          <div class="value">40</div>
        </div>

        <div class="card">
          <h3>Solved</h3>
          <div class="value">18</div>
        </div>

        <div class="card">
          <h3>Attempted</h3>
          <div class="value">10</div>
        </div>

        <div class="card">
          <h3>Remaining</h3>
          <div class="value">12</div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-box">
        <div>Overall Progress</div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div style="margin-top:5px;">18 / 40 completed</div>
      </div>

      <!-- Bottom -->
      <div class="grid">

        <div class="box">
          <h4>Recent Activity</h4>

          <div class="list-item">Solved: Two Sum</div>
          <div class="list-item">Attempted: 3Sum</div>
          <div class="list-item">Revised: Sliding Window Max</div>
        </div>

        <div class="box">
          <h4>Quick Tips</h4>

          <div class="list-item">Focus on patterns</div>
          <div class="list-item">Revise weekly</div>
          <div class="list-item">Track mistakes</div>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
